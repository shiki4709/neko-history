# Mochi CLI — Pipeline Configuration
# Copy to settings.yaml and fill in your API keys
#
# Workflow (from the tutorial):
#   1. Claude (script + prompts)
#   2. Higgsfield Nano Banana 2 (images: 9:16, 2K, upload ref photo)
#   3. Higgsfield Kling 3.0 (video: enhanced OFF, audio ON, 1080p, 10-15s)
#   4. ffmpeg (stitch clips + top label)
#   5. Premiere Pro or DaVinci Resolve (captions)
#   6. Instagram Edits app (final polish, optional)

apis:
  higgsfield:
    api_key: ""  # Optional — for future API automation. Manual mode works fine.

  # YouTube/TikTok/IG upload APIs (future)
  youtube:
    client_id: ""
    client_secret: ""

  tiktok:
    client_key: ""
    client_secret: ""

  instagram:
    access_token: ""
    business_account_id: ""

channels:
  japan:
    name: "Mochi in Old Japan"

  china:
    name: "Mochi in Ancient China"
